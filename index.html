<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Hexlet Project</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div class="container-fluid bg-dark p-5">
      <!-- Заголовок с формой -->
      <div class="row">
        <div class="col-lg-6 mx-auto text-light">
          <h1>RSS агрегатор</h1>
          <p>Начни читать RSS сегодня! Это легко, это красиво.</p>
          <form>
            <div class="row">
              <div class="col">
                <label for="rss-url" class="visually-hidden">Ссылка RSS</label>
                <input id="rss-url" class="form-control" type="text" placeholder="Ссылка RSS" aria-label="url" autofocus/>
              </div>
              <div class="col-auto">
                <button type="submit" class="btn btn-primary" data-submit-button>Добавить</button>
              </div>
            </div>
          </form>
          <p class="mt-2 text-white-50">Пример: https://lorem-rss.hexlet.app/feed</p>
          <p class="feedback m-0 position-absolute"></p>
        </div>
      </div>
    </div>
    <!-- контейнер постов и фидов -->
    <div class="container-fluid flex-grow-1 p-4">
      <div class="row">
        <div class="col-md-10 col-lg-7 mx-auto posts"></div>
        <div class="col-md-10 col-lg-5 mx-auto feeds"></div>
      </div>
    </div>
    <!-- footer -->
    <footer class="container-fluid bg-dark text-center text-light p-3">
      created by Я
    </footer>
    <!-- модальное окно -->
      <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
       <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalLabel"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
           <div class="modal-body"></div>
          <div class="modal-footer">
            <a href="#" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
              Читать полностью
            </a>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          </div>
         </div>
        </div>
      </div>
    <!-- скрипт -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
